version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: note_manager_db
    environment:
      POSTGRES_DB: note_manager_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: